<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplo de formulario</title>
</head>
<body>
    <form action="cadastro.php" method="get" autocomplete="on">
        <fieldset>
                <p>
                    <label for="inome">nome</label>
                    <input type="text" name="nome" id="inome" required autocomplete="name" minlength="2" maxlength="20">
                </p>
                <p>
                    <label for="iemail">email</label>
                    <input type="email" name="email" id="iemail" required autocomplete="email">
                </p>
                <p>
                    <label for="itel">telefone</label>
                    <input type="tel" name="tel" id="itel" autocomplete="tel" required  pattern="[0-9]{2} [0-9]{5}-[0-9]{4}" title="Digite o telefone no formato: 99 99999-9999">
                </p>
                <p>
                    <input type="submit" value="enviar">
                    <input type="reset" value="limpar">
                </p>
        </fieldset>
    </form>
</body>
</html>
