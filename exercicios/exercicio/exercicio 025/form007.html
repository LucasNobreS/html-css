<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formularios</title>
</head>
<body>
    <h1>exemplo de formularios</h1>
    <form action="cadastro.php" method="get">
        <p>
            <label for="iest"> estado</label>
            <select name="estado" id="iest">
                <optgroup label="região sudeste">
                    <option value="SP">sao paulo</option>
                    <option value="RJ"> rio de janeiro</option>
                    <option value="MG">minas gerais</option>
                </optgroup>

                <optgroup label="regiao nordeste">
                    <option value="MA">maranhao</option>
                    <option value="PE">pernambuco</option>
                    <option value="RN">rio grande do norte</option>
                </optgroup>

            </select>
        </p>
        <p>
            <label for="iprof">profissao</label>
            <input type="text" name="prof" id="iprof" list="lstprof">
            <datalist id="lstprof">
                <option value="ADM">administrador</option>
                <option value="CONT">contabilista</option>
                <option value="DEV">desenvolvedor</option>
                <option value="PROF">professor</option>

            </datalist>
        </p>
        <p>
            <input type="submit" value="enviar">
            <input type="reset" value="limpar">
        </p>
    </form>
</body>
</html>
